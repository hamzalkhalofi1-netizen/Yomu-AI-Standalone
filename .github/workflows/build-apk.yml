name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # تحديث للنسخة v4 لضمان الاستقرار

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # تأكد بلي هاد السر محطوط ف GitHub Secrets

      - name: Install dependencies
        run: npm install # غادي يقرى الملفات اللي عمرنا ف Replit

      - name: Install EAS CLI
        run: npm install -g eas-cli # تثبيت الأداة اللي كانت ناقصة

      - name: Build APK
        # تصحيح الأمر من eas-build لـ eas build وزيادة npx لضمان التشغيل
        run: npx eas build --platform android --profile preview --local --output ./yomu-ai.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # ضروري v4 باش يتحمل الملف ف اللخر
        with:
          name: Yomu-AI-App
          path: ./yomu-ai.apk
          
